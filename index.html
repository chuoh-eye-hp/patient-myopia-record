<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>近視記録入力（患者用）</title>
  <style>
    :root{
      --bg:#f5f8fc;
      --card:#ffffff;
      --line:#d9e2ef;
      --text:#243447;
      --sub:#5f7288;
      --accent:#2b6cb0;
      --shadow:0 10px 30px rgba(30, 60, 90, 0.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      background:linear-gradient(180deg,#f7fbff 0%,#f2f6fb 100%);
      color:var(--text);
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:24px 16px 48px;
    }
    .hero,.card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:24px;
    }
    .hero{ margin-bottom:18px; }
    .hero h1{
      margin:0 0 10px;
      font-size:clamp(24px,3.2vw,34px);
    }
    .hero p,.desc,.footer-note,.muted{
      color:var(--sub);
      line-height:1.7;
    }
    .top-actions,.actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }
    .progress{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
      margin:18px 0 24px;
    }
    .step-chip{
      background:#eef4fb;
      color:#5a6f87;
      border:1px solid #dbe6f3;
      border-radius:999px;
      padding:10px 12px;
      font-size:14px;
      text-align:center;
      font-weight:700;
    }
    .step-chip.active{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }
    .step{ display:none; }
    .step.active{ display:block; }
    h2{ margin:0 0 10px; font-size:26px; }
    h3{ margin:22px 0 12px; font-size:18px; }
    .grid{ display:grid; gap:16px; }
    .grid-2{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    .grid-3{ grid-template-columns:repeat(3,minmax(0,1fr)); }
    @media (max-width:760px){
      .grid-2,.grid-3,.progress{ grid-template-columns:1fr; }
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .field label{
      font-weight:700;
      font-size:15px;
    }
    input[type="text"],
    input[type="number"],
    input[type="date"],
    textarea,
    select{
      width:100%;
      border:1px solid #cfd9e7;
      border-radius:14px;
      background:#fff;
      padding:12px 14px;
      font-size:15px;
      color:var(--text);
      outline:none;
    }
    textarea{
      min-height:110px;
      resize:vertical;
    }
    .choice-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:10px;
    }
    .check-card{
      position:relative;
    }
    .check-card input{
      position:absolute;
      inset:0;
      opacity:0;
      cursor:pointer;
    }
    .check-card span{
      display:block;
      padding:12px 14px;
      border:1px solid #d5dfec;
      border-radius:14px;
      background:#fff;
      text-align:center;
      font-weight:700;
    }
    .check-card input:checked + span{
      background:#ebf4ff;
      border-color:#7fb0e8;
      color:#1f4f82;
    }
    .inline{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    button{
      border:none;
      border-radius:999px;
      padding:12px 18px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
    }
    .primary{ background:var(--accent); color:#fff; }
    .secondary,.ghost{
      background:#edf3fa;
      color:#35506f;
      border:1px solid #d7e2ef;
    }
    .ghost{ background:#fff; }
    .summary{
      background:#f8fbff;
      border:1px solid #dbe7f4;
      border-radius:18px;
      padding:18px;
      line-height:1.8;
    }
    .summary-section{ margin-bottom:18px; }
    .summary-section h4{ margin:0 0 8px; font-size:17px; }
    .summary dl{
      margin:0;
      display:grid;
      grid-template-columns:190px 1fr;
      gap:8px 14px;
    }
    .summary dt{
      font-weight:700;
      color:#45617f;
    }
    .summary dd{ margin:0; }
    .hidden{ display:none !important; }
    .tag{
      display:inline-block;
      background:#edf4ff;
      color:#2c5282;
      border:1px solid #d4e2f7;
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      margin:2px 6px 2px 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>近視記録入力（患者用）</h1>
      <p>来院前に分かる範囲をご入力ください。</p>
      <div class="top-actions">
        <button class="primary" type="button" onclick="goToStep(1)">入力をはじめる</button>
        <button class="secondary" type="button" onclick="loadJsonFile()">前回の入力を読み込む</button>
      </div>
    </section>

    <div class="progress">
      <div class="step-chip active" data-stepchip="1">1. 基本情報</div>
      <div class="step-chip" data-stepchip="2">2. 生活情報</div>
      <div class="step-chip" data-stepchip="3">3. 治療状況</div>
      <div class="step-chip" data-stepchip="4">4. 確認</div>
      <div class="step-chip" data-stepchip="5">5. 完了</div>
    </div>

    <section class="card">
      <div class="step active" data-step="1">
        <h2>基本情報</h2>
        <p class="desc">患者さんの基本情報を入力してください。診察券番号は任意です。</p>
        <div class="grid grid-2">
          <div class="field">
            <label for="patientName">氏名</label>
            <input type="text" id="patientName" />
          </div>
          <div class="field">
            <label for="patientId">診察券番号（任意）</label>
            <input type="text" id="patientId" />
          </div>
          <div class="field">
            <label for="age">年齢</label>
            <input type="number" id="age" min="0" max="120" />
          </div>
          <div class="field">
            <label for="inputDate">入力日</label>
            <input type="date" id="inputDate" />
          </div>
        </div>
        <div class="actions">
          <button class="secondary" type="button" onclick="saveDraft()">保存</button>
          <button class="primary" type="button" onclick="goToStep(2)">次へ</button>
        </div>
      </div>

      <div class="step" data-step="2">
        <h2>生活情報</h2>
        <p class="desc">学校の授業以外の近業時間について入力してください。</p>

        <h3>屋外活動</h3>
        <div class="grid grid-2">
          <div class="field">
            <label for="outdoorHoursPerWeek">1週間あたりの屋外活動時間</label>
            <input type="number" id="outdoorHoursPerWeek" min="0" step="0.5" placeholder="時間 / 週" />
          </div>
        </div>

        <h3>近距離作業</h3>
        <div class="grid grid-3">
          <div class="field">
            <label for="readingHours">書字・読書（時間 / 日）</label>
            <input type="number" id="readingHours" min="0" step="0.5" />
          </div>
          <div class="field">
            <label for="readingDistance">書字・読書（距離 cm）</label>
            <input type="number" id="readingDistance" min="0" step="1" />
          </div>
          <div></div>

          <div class="field">
            <label for="tabletHours">スマホ・タブレット（時間 / 日）</label>
            <input type="number" id="tabletHours" min="0" step="0.5" />
          </div>
          <div class="field">
            <label for="tabletDistance">スマホ・タブレット（距離 cm）</label>
            <input type="number" id="tabletDistance" min="0" step="1" />
          </div>
          <div></div>

          <div class="field">
            <label for="computerHours">コンピューター（時間 / 日）</label>
            <input type="number" id="computerHours" min="0" step="0.5" />
          </div>
          <div class="field">
            <label for="computerDistance">コンピューター（距離 cm）</label>
            <input type="number" id="computerDistance" min="0" step="1" />
          </div>
          <div></div>
        </div>

        <h3>睡眠</h3>
        <div class="grid grid-2">
          <div class="field">
            <label for="sleepPeriod">夜寝る時間</label>
            <div class="inline">
              <select id="sleepPeriod" style="max-width:140px">
                <option value="">選択</option>
                <option value="午後">午後</option>
                <option value="午前">午前</option>
              </select>
              <input type="number" id="sleepHour" min="0" max="12" step="1" placeholder="時頃" style="max-width:180px" />
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="ghost" type="button" onclick="goToStep(1)">戻る</button>
          <button class="secondary" type="button" onclick="saveDraft()">保存</button>
          <button class="primary" type="button" onclick="goToStep(3)">次へ</button>
        </div>
      </div>

      <div class="step" data-step="3">
        <h2>治療状況</h2>
        <p class="desc">行っている治療があれば入力してください。</p>

        <div class="field">
          <label>現在行っている近視抑制治療</label>
          <div class="choice-grid">
            <label class="check-card"><input type="checkbox" name="treatment" value="していない"><span>していない</span></label>
            <label class="check-card"><input type="checkbox" name="treatment" value="点眼"><span>点眼</span></label>
            <label class="check-card"><input type="checkbox" name="treatment" value="オルソ"><span>オルソ</span></label>
            <label class="check-card"><input type="checkbox" name="treatment" value="眼鏡"><span>眼鏡</span></label>
            <label class="check-card"><input type="checkbox" name="treatment" value="その他"><span>その他</span></label>
          </div>
        </div>

        <div class="grid grid-2" style="margin-top:18px">
          <div class="field">
            <label for="treatmentStart">開始時期（任意）</label>
            <input type="text" id="treatmentStart" placeholder="例：2025年4月ごろ" />
          </div>
        </div>

        <div class="grid grid-2" style="margin-top:8px">
          <div class="field">
            <label for="eyeDropStatus">点眼できているか？</label>
            <select id="eyeDropStatus" onchange="toggleEyeDropOther()">
              <option value="">選択してください</option>
              <option value="点眼できている">点眼できている</option>
              <option value="数回忘れることがある">数回忘れることがある</option>
              <option value="点眼できていないことが多い">点眼できていないことが多い</option>
              <option value="その他">その他</option>
            </select>
          </div>

          <div class="field hidden" id="eyeDropOtherWrap">
            <label for="eyeDropOther">その他の内容</label>
            <input type="text" id="eyeDropOther" placeholder="自由入力" />
          </div>
        </div>

        <div class="field" style="margin-top:8px">
          <label for="remarks">備考（任意）</label>
          <textarea id="remarks"></textarea>
        </div>

        <div class="actions">
          <button class="ghost" type="button" onclick="goToStep(2)">戻る</button>
          <button class="secondary" type="button" onclick="saveDraft()">保存</button>
          <button class="primary" type="button" onclick="goToStep(4)">次へ</button>
        </div>
      </div>

      <div class="step" data-step="4">
        <h2>入力内容の確認</h2>
        <div class="summary" id="summaryBox"></div>

        <div class="actions">
          <button class="ghost" type="button" onclick="goToStep(3)">戻る</button>
          <button class="secondary" type="button" onclick="saveDraft()">保存</button>
          <button class="primary" type="button" onclick="sendToClinic()">院内へ送信</button>
          <button class="secondary" type="button" onclick="saveJson()">JSON保存して提出</button>
          <button class="secondary" type="button" onclick="saveHtml()">HTML保存</button>
          <button class="primary" type="button" onclick="goToStep(5)">完了へ</button>
        </div>
      </div>

      <div class="step" data-step="5">
        <h2>入力完了</h2>
        <p class="desc">送信または保存が完了したら、この画面を閉じてください。</p>
        <div class="actions">
          <button class="ghost" type="button" onclick="goToStep(4)">戻る</button>
          <button class="primary" type="button" onclick="sendToClinic()">院内へ送信</button>
          <button class="secondary" type="button" onclick="saveJson()">JSON保存して提出</button>
        </div>
      </div>
    </section>
  </div>

  <input type="file" id="jsonLoader" accept=".json,application/json" class="hidden" />

  <script>
    const STORAGE_KEY = "patient_myopia_record_draft_v3";
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwnyIwRNzGLLsll3mcSLB6bxCqtX4-oWzi9SFYEujZlE39sn-O2A45SbePxvpDmrGKSIA/exec";
    let currentStep = 1;

    function todayString() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function init() {
      if (!document.getElementById("inputDate").value) {
        document.getElementById("inputDate").value = todayString();
      }

      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          setFormData(JSON.parse(saved));
        } catch (e) {
          console.warn(e);
        }
      }

      bindTreatmentLogic();
      toggleEyeDropOther();
      updateSummary();
      goToStep(1);
    }

    function bindTreatmentLogic() {
      const treatments = document.querySelectorAll('input[name="treatment"]');

      treatments.forEach(cb => {
        cb.addEventListener("change", () => {
          const none = Array.from(treatments).find(el => el.value === "していない");
          if (cb.value === "していない" && cb.checked) {
            treatments.forEach(el => {
              if (el.value !== "していない") el.checked = false;
            });
          } else if (cb.value !== "していない" && cb.checked && none) {
            none.checked = false;
          }
          updateSummary();
        });
      });

      document.querySelectorAll("input, select, textarea").forEach(el => {
        el.addEventListener("input", updateSummary);
        el.addEventListener("change", updateSummary);
      });
    }

    function goToStep(step) {
      currentStep = step;
      document.querySelectorAll(".step").forEach(el => {
        el.classList.toggle("active", Number(el.dataset.step) === step);
      });
      document.querySelectorAll(".step-chip").forEach(el => {
        el.classList.toggle("active", Number(el.dataset.stepchip) === step);
      });
      if (step === 4 || step === 5) updateSummary();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function toggleEyeDropOther() {
      const select = document.getElementById("eyeDropStatus");
      const wrap = document.getElementById("eyeDropOtherWrap");
      const input = document.getElementById("eyeDropOther");
      const isOther = select.value === "その他";
      wrap.classList.toggle("hidden", !isOther);
      if (!isOther) input.value = "";
      updateSummary();
    }

    function getTreatments() {
      return Array.from(document.querySelectorAll('input[name="treatment"]:checked')).map(el => el.value);
    }

    function getFormData() {
      const eyeDropStatus = document.getElementById("eyeDropStatus").value;
      return {
        basicInfo: {
          patientName: document.getElementById("patientName").value.trim(),
          patientId: document.getElementById("patientId").value.trim(),
          age: document.getElementById("age").value,
          inputDate: document.getElementById("inputDate").value
        },
        lifestyle: {
          outdoorHoursPerWeek: document.getElementById("outdoorHoursPerWeek").value,
          readingHours: document.getElementById("readingHours").value,
          readingDistance: document.getElementById("readingDistance").value,
          tabletHours: document.getElementById("tabletHours").value,
          tabletDistance: document.getElementById("tabletDistance").value,
          computerHours: document.getElementById("computerHours").value,
          computerDistance: document.getElementById("computerDistance").value,
          sleepPeriod: document.getElementById("sleepPeriod").value,
          sleepHour: document.getElementById("sleepHour").value
        },
        treatment: {
          currentTreatments: getTreatments(),
          treatmentStart: document.getElementById("treatmentStart").value.trim(),
          eyeDropStatus: eyeDropStatus,
          eyeDropOther: eyeDropStatus === "その他" ? document.getElementById("eyeDropOther").value.trim() : "",
          remarks: document.getElementById("remarks").value.trim()
        },
        meta: {
          savedAt: new Date().toISOString()
        }
      };
    }

    function setFormData(data) {
      const setValue = (id, value) => {
        const el = document.getElementById(id);
        if (el && value !== undefined && value !== null) el.value = value;
      };

      setValue("patientName", data.basicInfo?.patientName || "");
      setValue("patientId", data.basicInfo?.patientId || "");
      setValue("age", data.basicInfo?.age || "");
      setValue("inputDate", data.basicInfo?.inputDate || todayString());

      setValue("outdoorHoursPerWeek", data.lifestyle?.outdoorHoursPerWeek || "");
      setValue("readingHours", data.lifestyle?.readingHours || "");
      setValue("readingDistance", data.lifestyle?.readingDistance || "");
      setValue("tabletHours", data.lifestyle?.tabletHours || "");
      setValue("tabletDistance", data.lifestyle?.tabletDistance || "");
      setValue("computerHours", data.lifestyle?.computerHours || "");
      setValue("computerDistance", data.lifestyle?.computerDistance || "");
      setValue("sleepPeriod", data.lifestyle?.sleepPeriod || "");
      setValue("sleepHour", data.lifestyle?.sleepHour || "");

      const selectedTreatments = data.treatment?.currentTreatments || [];
      document.querySelectorAll('input[name="treatment"]').forEach(cb => {
        cb.checked = selectedTreatments.includes(cb.value);
      });

      setValue("treatmentStart", data.treatment?.treatmentStart || "");
      setValue("eyeDropStatus", data.treatment?.eyeDropStatus || "");
      setValue("eyeDropOther", data.treatment?.eyeDropOther || "");
      setValue("remarks", data.treatment?.remarks || "");

      toggleEyeDropOther();
      updateSummary();
    }

    function saveDraft() {
      const data = getFormData();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      alert("入力内容を保存しました。");
    }

    function downloadTextFile(filename, text, mimeType) {
      const blob = new Blob([text], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function buildFileBaseName() {
      const name = document.getElementById("patientName").value.trim() || "patient";
      const date = document.getElementById("inputDate").value || todayString();
      return `${name}_近視記録_${date}`;
    }

    function saveJson() {
      const data = getFormData();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      downloadTextFile(`${buildFileBaseName()}.json`, JSON.stringify(data, null, 2), "application/json");
    }

    function saveHtml() {
      downloadTextFile(`${buildFileBaseName()}.html`, document.documentElement.outerHTML, "text/html");
    }

    function loadJsonFile() {
      document.getElementById("jsonLoader").click();
    }

    document.getElementById("jsonLoader").addEventListener("change", function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (event) {
        try {
          const data = JSON.parse(event.target.result);
          setFormData(data);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          alert("前回の入力を読み込みました。");
        } catch (err) {
          alert("JSONの読み込みに失敗しました。");
        }
      };
      reader.readAsText(file);
      e.target.value = "";
    });

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatValue(value, suffix = "") {
      return value !== undefined && value !== null && value !== ""
        ? `${escapeHtml(value)}${suffix}`
        : '<span class="muted">未入力</span>';
    }

    function updateSummary() {
      const data = getFormData();
      const eyeDropText =
        data.treatment.eyeDropStatus === "その他"
          ? `その他：${escapeHtml(data.treatment.eyeDropOther || "未入力")}`
          : (data.treatment.eyeDropStatus ? escapeHtml(data.treatment.eyeDropStatus) : '<span class="muted">未入力</span>');

      const treatmentTags = data.treatment.currentTreatments.length
        ? data.treatment.currentTreatments.map(v => `<span class="tag">${escapeHtml(v)}</span>`).join("")
        : '<span class="muted">未入力</span>';

      document.getElementById("summaryBox").innerHTML = `
        <div class="summary-section">
          <h4>基本情報</h4>
          <dl>
            <dt>氏名</dt><dd>${formatValue(data.basicInfo.patientName)}</dd>
            <dt>診察券番号</dt><dd>${formatValue(data.basicInfo.patientId)}</dd>
            <dt>年齢</dt><dd>${formatValue(data.basicInfo.age, "歳")}</dd>
            <dt>入力日</dt><dd>${formatValue(data.basicInfo.inputDate)}</dd>
          </dl>
        </div>
        <div class="summary-section">
          <h4>生活情報</h4>
          <dl>
            <dt>屋外活動時間</dt><dd>${formatValue(data.lifestyle.outdoorHoursPerWeek, " 時間 / 週")}</dd>
            <dt>書字・読書</dt><dd>${formatValue(data.lifestyle.readingHours, " 時間 / 日")} / ${formatValue(data.lifestyle.readingDistance, " cm")}</dd>
            <dt>スマホ・タブレット</dt><dd>${formatValue(data.lifestyle.tabletHours, " 時間 / 日")} / ${formatValue(data.lifestyle.tabletDistance, " cm")}</dd>
            <dt>コンピューター</dt><dd>${formatValue(data.lifestyle.computerHours, " 時間 / 日")} / ${formatValue(data.lifestyle.computerDistance, " cm")}</dd>
            <dt>夜寝る時間</dt><dd>${data.lifestyle.sleepPeriod || data.lifestyle.sleepHour ? `${formatValue(data.lifestyle.sleepPeriod)} ${formatValue(data.lifestyle.sleepHour, " 時頃")}` : '<span class="muted">未入力</span>'}</dd>
          </dl>
        </div>
        <div class="summary-section">
          <h4>治療状況</h4>
          <dl>
            <dt>現在行っている近視抑制治療</dt><dd>${treatmentTags}</dd>
            <dt>開始時期</dt><dd>${formatValue(data.treatment.treatmentStart)}</dd>
            <dt>点眼できているか？</dt><dd>${eyeDropText}</dd>
            <dt>備考</dt><dd>${formatValue(data.treatment.remarks)}</dd>
          </dl>
        </div>
      `;
    }

    async function sendToClinic() {
      const data = getFormData();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

      if (!GAS_WEBAPP_URL || GAS_WEBAPP_URL.includes("ここにApps Script")) {
        alert("GAS_WEBAPP_URL に Apps Script のWebアプリURLを設定してください。");
        return;
      }

      try {
        const response = await fetch(GAS_WEBAPP_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(data)
        });

        const resultText = await response.text();

        if (!response.ok) {
          throw new Error(resultText || "送信に失敗しました。");
        }

        let result;
        try {
          result = JSON.parse(resultText);
        } catch {
          result = { ok: true };
        }

        if (result.ok === false) {
          throw new Error(result.error || "送信に失敗しました。");
        }

        alert("院内へ送信しました。");
      } catch (error) {
        console.error(error);
        alert("送信に失敗しました。Apps Scriptの公開設定、URL、responsesシート名を確認してください。");
      }
    }

    init();
  </script>
</body>
